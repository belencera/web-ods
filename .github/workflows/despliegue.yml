name: Desplegar Frontend a Hostinger

on:
  push:
    branches:
      - main 

jobs:
  web-deploy:
    name: Desplegar carpetas
    runs-on: ubuntu-latest
    steps:
    - name: Obtener código del repo
      uses: actions/checkout@v4

    - name: Subir solo el Front por FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: 21                           # <-- Forzamos el puerto estándar FTP para evitar el timeout
        protocol: ftp                      # <-- Especificamos el protocolo limpio
        
        local-dir: ./public/               # <-- Sube solo lo que esté dentro de 'public'
        server-dir: ./                     # <-- Lo suelta directo en la raíz donde conecta tu FTP
        
