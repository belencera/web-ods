<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Formulario de Aplicación - Web On Demand Solutions">
    <title>Formulario de Aplicación</title>

    <!-- Estilos -->
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/pages/checkout.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@17.0.19/build/css/intlTelInput.min.css"/>

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="../assets/icons/favicon.ico">
</head>

<body>
    <div class="container">
        <header>
            <h1>¿Listo para aplicar?</h1>
        </header>

        <main>
            <div class="checkout-container">

                <h2>Completa tus datos para finalizar: </h2>

                <form id="aplicationForm" class="checkout-form">
                    <label>Nombre y Apellidos:</label>
                    <input type="text" id="fullName" name="fullName" required>

                    <label for="company">Empresa:</label>
                    <input type="text" id="company" name="company" required>

                    <label for="rubric">Rubro:</label>
                    <input type="text" id="rubric" name="rubric" required>

                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>

                    <label for="phone">Teléfono:</label>
                    <input type="tel" id="phone" name="phone" required>

                    <label for="rrss">Redes Sociales:</label>
                    <input type="text" id="rrss" name="rrss" required>

                    <label for="website">Página web:</label>
                    <input type="text" id="website" name="website" required>

                    <label for="location">Ubicación:</label>
                    <input type="text" id="location" name="location" required>

                    <button type="submit" class="btn btn-primary btn-checkout">Enviar</button>
                </form>


                <p id="loading" class="loading">
                    Procesando tu información… ⏳
                </p>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/intl-tel-input@17.0.19/build/js/intlTelInput.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/intl-tel-input@17.0.19/build/js/utils.js"></script>

    <script src="../js/components/navigation.js"></script>
    <script src="../js/components/footer.js"></script>
    <script src="../js/pages/aplication-form.js"></script>
    <script src="../js/main.js"></script>
</body>

</html>
